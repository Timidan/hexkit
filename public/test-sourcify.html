<!DOCTYPE html>
<html>
<head>
    <title>Sourcify API Test</title>
</head>
<body>
    <h1>Sourcify API Test</h1>
    <div id="results"></div>
    
    <script>
    async function testSourcifyAPI() {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<p>Testing Sourcify API...</p>';
        
        const testContracts = [
            { chainId: 8453, address: '0x4200000000000000000000000000000000000006', name: 'Diamond (Base)' },
            { chainId: 1, address: '0xdac17f958d2ee523a2206206994597c13d831ec7', name: 'USDT (Ethereum)' }
        ];
        
        for (const contract of testContracts) {
            resultsDiv.innerHTML += `<h3>Testing ${contract.name}</h3>`;
            
            try {
                // Test 1: Check verification
                const checkResponse = await fetch(`/api/sourcify/server/v2/contract/${contract.chainId}/${contract.address}`);
                const checkData = await checkResponse.json();
                
                resultsDiv.innerHTML += `<p>Verification status: ${JSON.stringify(checkData)}</p>`;
                
                if (checkData.creationMatch || checkData.runtimeMatch) {
                    const matchType = checkData.creationMatch || checkData.runtimeMatch;
                    resultsDiv.innerHTML += `<p>✅ Verified with match: ${matchType}</p>`;
                    
                    // Test 2: Get metadata
                    const metadataResponse = await fetch(`/api/repo/contracts/${matchType}/${contract.chainId}/${contract.address}/metadata.json`);
                    const metadata = await metadataResponse.json();
                    
                    resultsDiv.innerHTML += `<p>✅ Metadata retrieved</p>`;
                    
                    // Extract contract name
                    let contractName = null;
                    if (metadata.settings?.compilationTarget) {
                        const targets = Object.values(metadata.settings.compilationTarget);
                        if (targets.length > 0) {
                            contractName = targets[0];
                        }
                    }
                    
                    resultsDiv.innerHTML += `<p>Contract name: ${contractName || 'Not found'}</p>`;
                    resultsDiv.innerHTML += `<p>ABI functions: ${metadata.output?.abi?.length || 0}</p>`;
                } else {
                    resultsDiv.innerHTML += `<p>❌ Not verified</p>`;
                }
            } catch (error) {
                resultsDiv.innerHTML += `<p>❌ Error: ${error.message}</p>`;
            }
            
            resultsDiv.innerHTML += '<hr>';
        }
    }
    
    // Run test when page loads
    testSourcifyAPI();
    </script>
</body>
</html>
